apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  labels:
    app: web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      initContainers:
        - name: init-db
          image: busybox:1.35
          command: ['sh', '-c', 'until nslookup db; do sleep 2; done']
      containers:
        - name: web
          image: nginx:1.21
          ports:
            - containerPort: 80
        - name: sidecar
          image: gcr.io/my-project/log-collector:v1.0
          volumeMounts:
            - name: logs
              mountPath: /var/log
        - name: digest-only
          image: nginx@sha256:0d17b565c37bcbd895e9d92315a05c1c3c9a29f762b011a10c54a66cd53c9b31
        - name: tag-and-digest
          image: redis:7-alpine@sha256:0d17b565c37bcbd895e9d92315a05c1c3c9a29f762b011a10c54a66cd53c9b31
      volumes:
        - name: logs
          emptyDir: {}

apiVersion: batch/v1
kind: CronJob
metadata:
  name: cleanup
spec:
  schedule: "0 2 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: cleanup
              image: python:3.11-slim
              command: ['python', '-c', 'print("cleanup done")']
          restartPolicy: OnFailure
